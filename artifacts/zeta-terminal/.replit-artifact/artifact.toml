kind = "web"
previewPath = "/"
title = "Zeta Security Terminal"
version = "1.0.0"
id = "artifacts/zeta-terminal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22303

[services.development]
run = "pnpm --filter @workspace/zeta-terminal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/zeta-terminal", "run", "build" ]
publicDir = "artifacts/zeta-terminal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22303"
BASE_PATH = "/"
